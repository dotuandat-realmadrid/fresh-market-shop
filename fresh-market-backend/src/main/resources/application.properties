# Redis Cache
spring.data.redis.url=${REDIS_URL:}
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.cache.type=redis

spring.application.name=fresh-market-backend
server.port=${PORT}

# Cau hinh path
server.servlet.context-path=/fresh-market

# Cau hinh database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# Cau hinh JPA
#spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Toi uu hoa truy van N+1 (Batch Fetching)
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# Cau hinh JSP
#spring.mvc.view.prefix=/
#spring.mvc.view.suffix=.jsp

spring.jpa.open-in-view=false
#spring.thymeleaf.enabled=false

app.file.storage-dir=${STORAGE_DIR}

#Cau hinh HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.leak-detection-threshold=300000

# Cau hinh jwt
jwt.signerKey=${JWT_SIGNER_KEY}
jwt.valid-duration=1
jwt.refreshable-duration=10

# Cau hinh multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Cau hinh api AI
ai.gemini.apiKey=${API_KEY_GEMINI}
ai.gemini_3.1_flash_lite.apiUrl=${API_URL_GEMINI_3_1_FLASH_LITE}
ai.gemini_2.5_flash_lite.apiUrl=${API_URL_GEMINI_2_5_FLASH_LITE}
ai.gemini_2.5_flash.apiUrl=${API_URL_GEMINI_2_5_FLASH}

vnpay.pay-url=${VNPAY_PAY_URL}
vnpay.return-url=${VNPAY_RETURN_URL}
vnpay.tmn-code=${VNPAY_TMN_CODE}
vnpay.secret-key=${VNPAY_SECRET_KEY}
vnpay.api-url=${VNPAY_API_URL}

